<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Page not found — Stackly Marketing">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/404.css">

  <title>404 — Page Not Found | Stackly Marketing</title>
</head>
<body>

<main class="error-page">
  <div class="error-page__bg">
    <div class="error-page__glow"></div>
    <div class="error-page__orb error-page__orb--1"></div>
    <div class="error-page__orb error-page__orb--2"></div>
    <div class="error-page__orb error-page__orb--3"></div>
  </div>

  <div class="error-page__inner">
    <div class="error-page__code">
      <span class="error-page__digit error-page__digit--1">4</span>
      <span class="error-page__separator"></span>
      <span class="error-page__digit error-page__digit--2 error-page__digit-accent">0</span>
      <span class="error-page__separator"></span>
      <span class="error-page__digit error-page__digit--3">4</span>
    </div>

    <h1 class="error-page__title">Page Not Found</h1>
    <p class="error-page__text">The page you're looking for doesn't exist, has been moved, or is temporarily unavailable. Let's get you back on track.</p>

    <div class="error-page__actions">
      <button onclick="history.length > 1 ? history.back() : location.href='index.html'" class="error-page__btn error-page__btn--outline">
        <span class="error-page__btn-arrow">&larr;</span>
        Go Back
      </button>
      <a href="index.html" class="error-page__btn error-page__btn--primary">
        Back to Home
        <span class="error-page__btn-arrow">&rarr;</span>
      </a>
    </div>
  </div>
</main>

</body>
</html>
